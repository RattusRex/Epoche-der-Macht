services:
  web:
    build:
      target: dev
    command: ["pnpm", "dev"]
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - .:/app
      - node-modules:/app/node_modules

  worker:
    build:
      target: dev
    command: ["node", "--import", "tsx", "src/worker/main.ts"]
    volumes:
      - .:/app
      - node-modules:/app/node_modules

  postgres:
    networks:
      - dev-access
    ports:
      - "127.0.0.1:5432:5432"

networks:
  dev-access:

volumes:
  node-modules:
