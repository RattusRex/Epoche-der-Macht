name: epoha

services:
  web:
    build:
      context: .
    environment:
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health/live').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 15s
    networks:
      - frontend
      - backend

  worker:
    build:
      context: .
    command: ["node", "dist-worker/worker/main.js"]
    environment:
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    stop_grace_period: 15s
    networks:
      - backend

  postgres:
    image: postgres:18.4-bookworm
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-epoha}
      POSTGRES_USER: ${POSTGRES_USER:-epoha}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 12
    volumes:
      - postgres-data:/var/lib/postgresql
    networks:
      - backend

  cloudflared:
    image: cloudflare/cloudflared:2026.7.2
    profiles:
      - tunnel
    command:
      ["tunnel", "--no-autoupdate", "run", "--token", "${TUNNEL_TOKEN:-}"]
    depends_on:
      web:
        condition: service_healthy
    networks:
      - frontend

volumes:
  postgres-data:

networks:
  frontend:
  backend:
    internal: true
